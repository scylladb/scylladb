/var/log/scylla-perf/*.data {
    daily
    rotate 14
    # compress handled by prerotate for files older than 3 days
    missingok
    notifempty
    dateext
    dateformat -%Y%m%d
    olddir /var/log/scylla-perf/old
    create 0640 root root
    postrotate
        systemctl start perf-collector.service
    endscript
    prerotate
        find /var/log/scylla-perf -maxdepth 1 -name '*.data-*' -mtime +3 -exec gzip {} \;
    endscript
}

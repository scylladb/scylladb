[package]
name = "inc"
version = "0.1.0"
edition = "2021"
# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
# NOTE: keep cxx pinned to the exact same version as the cxxbridge CLI
# installed by install-dependencies.sh (currently 1.0.83). The C++ side of the
# FFI is generated by the cxxbridge binary and the Rust side by this crate; if
# the two versions differ, the generated cxxbridge symbols fail to resolve at
# link time. Bumping cxx therefore requires bumping cxxbridge-cmd in
# install-dependencies.sh and rebuilding the toolchain image in lockstep.
cxx = { version = "=1.0.83", features = ["c++20"] }
